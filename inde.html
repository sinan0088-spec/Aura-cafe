<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Cafe Menü</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}
h1{
text-align:center;
color:#6b3e26;
}
.kategori{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
}
.urun{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #ddd;
}
</style>
</head>
<body>

<h1>☕ Aura Cafe Menü</h1>

<div class="kategori">
<h2>Kahveler</h2>
<div class="urun"><span>Türk Kahvesi</span><span>50 TL</span></div>
<div class="urun"><span>Espresso</span><span>90 TL</span></div>
<div class="urun"><span>Americano</span><span>90 TL</span></div>
<div class="urun"><span>Latte</span><span>90 TL</span></div>
<div class="urun"><span>Cappuccino</span><span>90 TL</span></div>
</div>

<div class="kategori">
<h2>Çaylar</h2>
<div class="urun"><span>Çay</span><span>20 TL</span></div>
<div class="urun"><span>Yeşil Çay</span><span>20 TL</span></div>
<div class="urun"><span>Ada Çayı</span><span>20 TL</span></div>
</div>

<div class="kategori">
<h2>Poğaçalar</h2>
<div class="urun"><span>Peynirli Poğaça</span><span>25 TL</span></div>
</div>

</body>
</html>
